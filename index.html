<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HNG Stage 1 Todo Card</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <main>

    <article data-testid="test-todo-card" class="todo-card">

      <h2 data-testid="test-todo-title">
        Finish Stage 0 Task Submission
      </h2>

      <button
        data-testid="test-todo-expand-toggle"
        aria-expanded="false"
        aria-controls="descriptionSection"
      >
        Expand
      </button>

      <div
        data-testid="test-todo-collapsible-section"
        id="descriptionSection"
      >
        <p data-testid="test-todo-description">
          Complete To-do list app and submit before deadline
        </p>
      </div>

      <span
        data-testid="test-todo-priority"
        class="priority high"
        aria-label="High Priority"
        id="priorityText"
      >
        High
      </span>

      <span
        data-testid="test-todo-priority-indicator"
        id="priorityIndicator"
        class="high"
      >
        ●
      </span>

      <time
        data-testid="test-todo-due-date"
        datetime="2026-04-16"
      >
        Due April 16, 2026
      </time>

      <p
        data-testid="test-todo-time-remaining"
        id="timeRemaining"
      >
        Loading...
      </p>

      <span
        data-testid="test-todo-overdue-indicator"
        id="overdueIndicator"
      >
      </span>

      <span
        data-testid="test-todo-status"
        id="status"
      >
        Pending
      </span>

      <select data-testid="test-todo-status-control" id="statusControl">
        <option>Pending</option>
        <option>In Progress</option>
        <option>Done</option>
      </select>

      <div class="checkbox-container">

        <input
          type="checkbox"
          id="complete"
          data-testid="test-todo-complete-toggle"
        />

        <label for="complete">
          Mark as complete
        </label>

      </div>

      <ul data-testid="test-todo-tags" class="tags">

        <li data-testid="test-todo-tag-work">
          Work
        </li>

        <li data-testid="test-todo-tag-urgent">
          Urgent
        </li>

      </ul>

      <div class="buttons">

        <button
          data-testid="test-todo-edit-button"
          id="editButton"
        >
          Edit
        </button>

        <button
          data-testid="test-todo-delete-button"
          id="deleteButton"
        >
          Delete
        </button>

      </div>

      <form
        data-testid="test-todo-edit-form"
        id="editForm"
        class="hidden"
      >

        <label for="editTitle">Title</label>
        <input
          id="editTitle"
          data-testid="test-todo-edit-title-input"
          type="text"
        />

        <label for="editDescription">
          Description
        </label>

        <textarea
          id="editDescription"
          data-testid="test-todo-edit-description-input"
        ></textarea>

        <label for="editPriority">
          Priority
        </label>

        <select
          id="editPriority"
          data-testid="test-todo-edit-priority-select"
        >
          <option>Low</option>
          <option>Medium</option>
          <option>High</option>
        </select>

        <label for="editDate">
          Due Date
        </label>

        <input
          type="date"
          id="editDate"
          data-testid="test-todo-edit-due-date-input"
        />

        <div>

          <button
            type="button"
            data-testid="test-todo-save-button"
            id="saveButton"
          >
            Save
          </button>

          <button
            type="button"
            data-testid="test-todo-cancel-button"
            id="cancelButton"
          >
            Cancel
          </button>

        </div>

      </form>

    </article>

  </main>

  <script src="script.js"></script>

</body>
</html>
